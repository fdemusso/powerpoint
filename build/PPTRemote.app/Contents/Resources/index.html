<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PPT Remote</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      touch-action: none;
      overflow: hidden;
      overscroll-behavior: none;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      opacity: 0.5;
      text-transform: uppercase;
      user-select: none;
    }

    .buttons {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 480px;
      padding: 0 24px;
    }

    button {
      flex: 1;
      aspect-ratio: 1;
      border: none;
      border-radius: 24px;
      font-size: 3rem;
      cursor: pointer;
      transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:active {
      transform: scale(0.92);
      opacity: 0.8;
      filter: brightness(1.2);
    }

    #btn-prev {
      background: #2a2a2a;
      color: #fff;
    }

    #btn-next {
      background: #fff;
      color: #111;
    }

    #status {
      font-size: 0.78rem;
      opacity: 0.35;
      letter-spacing: 0.03em;
      user-select: none;
      height: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>PPT Remote</h1>

  <div class="buttons">
    <button id="btn-prev" aria-label="Slide precedente">&#8592;</button>
    <button id="btn-next" aria-label="Slide successiva">&#8594;</button>
  </div>

  <span id="status">pronto</span>

  <script>
    const status = document.getElementById("status");

    async function send(endpoint) {
      status.textContent = endpoint === "/next" ? "avanti →" : "← indietro";
      try {
        const r = await fetch(endpoint, { method: "POST" });
        if (!r.ok) throw new Error(r.status);
      } catch (e) {
        status.textContent = "errore: " + e.message;
        return;
      }
      setTimeout(() => (status.textContent = "pronto"), 600);
    }

    document.getElementById("btn-prev").addEventListener("click", () => send("/prev"));
    document.getElementById("btn-next").addEventListener("click", () => send("/next"));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") send("/next");
      if (e.key === "ArrowLeft")  send("/prev");
    });

    // Prevent zoom and scroll completely
    document.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
